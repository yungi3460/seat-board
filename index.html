<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>우리반 자리배치</title>

<style>

body{
background:linear-gradient(135deg,#6a85ff,#bac8ff);
font-family:sans-serif;
text-align:center;
color:white;
}

h1{
font-size:70px;
margin:20px;
}

.row{
display:flex;
justify-content:center;
margin:15px;
}

.seat{
width:200px;
height:110px;
background:white;
color:black;
border-radius:20px;
margin:8px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:bold;
box-shadow:0 8px 15px rgba(0,0,0,0.3);
}

.controls{
margin:20px;
}

button{
font-size:30px;
padding:15px 35px;
margin:10px;
border:none;
border-radius:15px;
cursor:pointer;
}

.start{background:#4CAF50;color:white;}
.stop{background:#e53935;color:white;}
.shuffle{background:#2196F3;color:white;}
.full{background:#9c27b0;color:white;}

textarea{
width:80%;
height:150px;
font-size:22px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>🎰 우리반 자리배치</h1>

<div class="controls">

<button class="start" onclick="start()">🎲 시작</button>
<button class="stop" onclick="stop()">⏹ 스탑</button>
<button class="shuffle" onclick="shuffle()">🔄 다시섞기</button>
<button class="full" onclick="fullscreen()">📺 전체화면</button>

</div>

<div id="seats"></div>

<h2>학생 이름 수정</h2>

<textarea id="studentInput"></textarea><br>

<button onclick="updateStudents()">적용</button>

<audio id="sound" preload="auto">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>

let students = {{ students | tojson | safe }};

let structure=[5,6,5,6,5];

let intervals=[];
let seats=[];

function createSeats(){

let container=document.getElementById("seats");
container.innerHTML="";
seats=[];

structure.forEach(num=>{

let row=document.createElement("div");
row.className="row";

for(let i=0;i<num;i++){

let seat=document.createElement("div");
seat.className="seat";
seat.innerText="";

row.appendChild(seat);
seats.push(seat);

}

container.appendChild(row);

});

}

function randomName(){
return students[Math.floor(Math.random()*students.length)];
}

function start(){

intervals.forEach(i=>clearInterval(i));
intervals=[];

seats.forEach((seat,i)=>{

intervals[i]=setInterval(()=>{
seat.innerText=randomName();
},50);

});

}

function stop(){

let shuffled=[...students].sort(()=>Math.random()-0.5);

seats.forEach((seat,i)=>{

setTimeout(()=>{

clearInterval(intervals[i]);

seat.innerText=shuffled[i] || "";

if(i===seats.length-1){
document.getElementById("sound").play();
}

},i*120);

});

}

function shuffle(){

let shuffled=[...students].sort(()=>Math.random()-0.5);

seats.forEach((seat,i)=>{
seat.innerText=shuffled[i] || "";
});

}

function updateStudents(){

let text=document.getElementById("studentInput").value;

students=text.split("\n").filter(x=>x.trim()!="");

shuffle();

}

function fullscreen(){

if(document.documentElement.requestFullscreen){
document.documentElement.requestFullscreen();
}

}

function init(){

createSeats();

document.getElementById("studentInput").value=students.join("\n");

shuffle();

}

init();

</script>

</body>
</html>
